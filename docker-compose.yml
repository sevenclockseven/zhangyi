services:
  zhangyi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zhangyi
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - zhangyi-data:/app/data
      - zhangyi-backups:/app/backups
      - zhangyi-exports:/app/exports
    environment:
      - TZ=Asia/Shanghai
      - PORT=8080
      # 数据库配置，默认 SQLite，切换 PostgreSQL 取消注释下面两行
      # - DB_DRIVER=postgres
      # - DB_DSN=host=postgres user=zhangyi password=zhangyi dbname=zhangyi port=5432 sslmode=disable
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - zhangyi-net
    # 如果用 PostgreSQL，取消下面的 depends_on
    # depends_on:
    #   postgres:
    #     condition: service_healthy

  # PostgreSQL（可选，取消注释启用）
  # postgres:
  #   image: postgres:16-alpine
  #   container_name: zhangyi-postgres
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_USER: zhangyi
  #     POSTGRES_PASSWORD: zhangyi
  #     POSTGRES_DB: zhangyi
  #   volumes:
  #     - zhangyi-pgdata:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U zhangyi"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #   networks:
  #     - zhangyi-net

volumes:
  zhangyi-data:
  zhangyi-backups:
  zhangyi-exports:
  # zhangyi-pgdata:

networks:
  zhangyi-net:
    ipam:
      config:
        - subnet: 192.168.88.0/24
