services:
  zhangyi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zhangyi
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - zhangyi-data:/app/data
      - zhangyi-backups:/app/backups
      - zhangyi-exports:/app/exports
    environment:
      - TZ=Asia/Shanghai
      - PORT=8080
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - zhangyi-net

volumes:
  zhangyi-data:
  zhangyi-backups:
  zhangyi-exports:

networks:
  zhangyi-net:
    ipam:
      config:
        - subnet: 192.168.88.0/24
